<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>get active. — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1A1814;--cream:#F5F2EC;--cream2:#EDE9E0;
  --muted:#9C9890;--gold:#C8A96E;--green:#2D5A3D;
  --red:#C0392B;--border:rgba(26,24,20,0.12);
  --mono:'DM Mono',monospace;--serif:'Courier Prime',monospace;
}
body{background:var(--cream2);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased;min-height:100vh;}

/* ── LOCK SCREEN ── */
#lock{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 24px;
}
.lock-logo{font-family:var(--serif);font-weight:700;font-size:28px;color:var(--ink);margin-bottom:6px;}
.lock-logo span{color:var(--gold);}
.lock-sub{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:40px;}
.lock-card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:32px;width:100%;max-width:360px;}
.lock-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.lock-input{
  width:100%;padding:12px 14px;border:1px solid var(--border);
  border-radius:4px;background:var(--cream2);
  font-family:var(--mono);font-size:14px;color:var(--ink);
  outline:none;margin-bottom:12px;transition:border-color 0.2s;
}
.lock-input:focus{border-color:var(--gold);}
.lock-btn{
  width:100%;padding:13px;background:var(--ink);color:var(--cream);
  border:none;border-radius:4px;font-family:var(--mono);
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;transition:background 0.15s;
}
.lock-btn:hover{background:#2A2724;}
.lock-err{font-size:11px;color:var(--red);margin-top:8px;display:none;}

/* ── DASHBOARD ── */
#dashboard{display:none;padding:0;}
.dash-nav{
  background:var(--ink);padding:16px 40px;
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:10;
}
.dash-logo{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--cream);}
.dash-logo span{color:var(--gold);}
.dash-tag{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.dash-out{
  font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;background:none;border:none;
  font-family:var(--mono);transition:color 0.2s;
}
.dash-out:hover{color:var(--gold);}

.dash-body{max-width:900px;margin:0 auto;padding:48px 40px;}

/* Cards */
.section-title{
  font-family:var(--serif);font-weight:700;font-size:22px;
  color:var(--ink);margin-bottom:20px;letter-spacing:-0.01em;
}
.card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:28px;margin-bottom:28px;}

/* Invite form */
.invite-row{display:flex;gap:0;max-width:500px;}
.invite-input{
  flex:1;padding:13px 16px;border:1px solid var(--border);
  border-right:none;border-radius:4px 0 0 4px;
  background:var(--cream2);font-family:var(--mono);
  font-size:13px;color:var(--ink);outline:none;transition:border-color 0.2s;
}
.invite-input:focus{border-color:var(--gold);}
.invite-btn{
  padding:13px 20px;background:var(--gold);color:var(--ink);
  border:none;border-radius:0 4px 4px 0;
  font-family:var(--mono);font-size:11px;letter-spacing:0.1em;
  text-transform:uppercase;cursor:pointer;white-space:nowrap;font-weight:500;
  transition:background 0.15s;
}
.invite-btn:hover{background:#D4B97E;}
.invite-msg{font-size:12px;margin-top:10px;min-height:18px;}
.invite-ok{color:var(--green);}
.invite-err{color:var(--red);}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:20px 24px;}
.stat-num{font-family:var(--serif);font-weight:700;font-size:36px;color:var(--ink);line-height:1;}
.stat-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* Users table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{
  font-size:9px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--muted);padding:8px 12px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  font-size:12px;padding:12px 12px;
  border-bottom:1px solid rgba(26,24,20,0.06);
  color:var(--ink);vertical-align:middle;
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--cream2);}
.badge{
  display:inline-block;font-size:9px;padding:2px 8px;
  border-radius:20px;letter-spacing:0.06em;font-weight:500;
}
.badge-active{background:rgba(45,90,61,0.12);color:var(--green);}
.badge-new{background:rgba(200,169,110,0.15);color:#8B6914;}
.badge-quiet{background:rgba(26,24,20,0.07);color:var(--muted);}
.loading{font-size:12px;color:var(--muted);padding:20px 0;text-align:center;}
.empty{font-size:12px;color:var(--muted);padding:20px 12px;}

/* Refresh btn */
.refresh-btn{
  font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;background:none;border:1px solid var(--border);
  font-family:var(--mono);padding:6px 12px;border-radius:3px;
  transition:all 0.15s;float:right;margin-top:-2px;
}
.refresh-btn:hover{border-color:var(--ink);color:var(--ink);}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock">
  <div class="lock-logo">get active<span>.</span></div>
  <div class="lock-sub">Admin Dashboard</div>
  <div class="lock-card">
    <div class="lock-label">Password</div>
    <input class="lock-input" type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
    <button class="lock-btn" onclick="unlock()">Unlock →</button>
    <div class="lock-err" id="pw-err">Incorrect password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="dash-nav">
    <div class="dash-logo">get active<span>.</span></div>
    <div class="dash-tag">Admin</div>
    <button class="dash-out" onclick="lockOut()">Lock →</button>
  </nav>

  <div class="dash-body">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total users</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-active">—</div>
        <div class="stat-label">Active this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-entries">—</div>
        <div class="stat-label">Total entries logged</div>
      </div>
    </div>

    <!-- Invite -->
    <div class="section-title">Invite a user</div>
    <div class="card">
      <div class="invite-row">
        <input class="invite-input" type="email" id="invite-email" placeholder="their@email.com">
        <button class="invite-btn" onclick="sendInvite()">Send invite →</button>
      </div>
      <div class="invite-msg" id="invite-msg"></div>
    </div>

    <!-- Users -->
    <div class="section-title">
      All users
      <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Joined</th>
              <th>Last entry</th>
              <th>Total entries</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="6" class="loading">Loading users…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────
const SB_URL = 'https://dgtknuvzflvvrxwwdzivz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndGtudXZ6Zmx2dnJ4d2R6aXZ6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzMzNjIxMCwiZXhwIjoyMDkyOTEyMjEwfQ.bBfoJK8m_08Nm-NXrPk1EyAdStHBbjR_H7Mt3Q5iulw';
const ADMIN_PW = 'neabuildsgetactive';

// ── Lock / Unlock ────────────────────────────────────
function unlock() {
  const val = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-err');
  if (val === ADMIN_PW) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadUsers();
  } else {
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function lockOut() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// Allow Enter key on password field
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

// ── Send invite ──────────────────────────────────────
async function sendInvite() {
  const email = document.getElementById('invite-email').value.trim();
  const msg = document.getElementById('invite-msg');
  if (!email || !email.includes('@')) {
    msg.className = 'invite-msg invite-err';
    msg.textContent = 'Please enter a valid email address.';
    return;
  }
  msg.className = 'invite-msg';
  msg.textContent = 'Sending invite…';
  try {
    const res = await fetch(`${SB_URL}/auth/v1/admin/users`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, email_confirm: false })
    });
    if (res.ok) {
      msg.className = 'invite-msg invite-ok';
      msg.textContent = `✓ Invite sent to ${email}`;
      document.getElementById('invite-email').value = '';
      setTimeout(() => loadUsers(), 1500);
    } else {
      const data = await res.json();
      msg.className = 'invite-msg invite-err';
      msg.textContent = data.msg || data.error_description || 'Something went wrong. Check Supabase.';
    }
  } catch(e) {
    msg.className = 'invite-msg invite-err';
    msg.textContent = 'Network error. Are you online?';
  }
}

// ── Load users ───────────────────────────────────────
async function loadUsers() {
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading…</td></tr>';

  try {
    // Fetch profiles
    const profRes = await fetch(`${SB_URL}/rest/v1/profiles?select=id,display_name,created_at`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const profiles = await profRes.json();

    // Fetch all entries (just user_id and date for counting)
    const entRes = await fetch(`${SB_URL}/rest/v1/entries?select=user_id,date&order=date.desc`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const entries = await entRes.json();

    if (!Array.isArray(profiles) || profiles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No users yet.</td></tr>';
      return;
    }

    // Calculate stats
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    const sevenDaysAgoStr = sevenDaysAgo.toISOString().slice(0,10);

    // Per-user entry counts and last entry
    const entryMap = {};
    const lastEntryMap = {};
    const activeThisWeek = new Set();
    let totalEntries = 0;

    entries.forEach(e => {
      if (!entryMap[e.user_id]) entryMap[e.user_id] = 0;
      entryMap[e.user_id]++;
      totalEntries++;
      if (!lastEntryMap[e.user_id]) lastEntryMap[e.user_id] = e.date;
      if (e.date >= sevenDaysAgoStr) activeThisWeek.add(e.user_id);
    });

    // Update stat cards
    document.getElementById('stat-total').textContent = profiles.length;
    document.getElementById('stat-active').textContent = activeThisWeek.size;
    document.getElementById('stat-entries').textContent = totalEntries;

    // Build table rows
    tbody.innerHTML = '';
    profiles.forEach(p => {
      const joined = p.created_at ? new Date(p.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'2-digit'}) : '—';
      const lastEntry = lastEntryMap[p.id] || null;
      const lastEntryDisplay = lastEntry ? new Date(lastEntry+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'}) : '—';
      const count = entryMap[p.id] || 0;

      // Status badge
      let badge = '';
      if (activeThisWeek.has(p.id)) {
        badge = '<span class="badge badge-active">Active</span>';
      } else if (count === 0) {
        badge = '<span class="badge badge-new">New</span>';
      } else {
        badge = '<span class="badge badge-quiet">Quiet</span>';
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${p.id || '—'}</td>
        <td>${p.display_name || '—'}</td>
        <td>${joined}</td>
        <td>${lastEntryDisplay}</td>
        <td>${count}</td>
        <td>${badge}</td>
      `;
      tbody.appendChild(tr);
    });

    // Fix email display — profiles don't store email, show ID abbreviated
    // Update first column header to ID
    document.querySelector('th:first-child').textContent = 'User ID';

  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Error loading users: ${e.message}</td></tr>`;
  }
}

// Send invite on Enter
document.getElementById('invite-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendInvite();
});
</script>
</body>
</html>
